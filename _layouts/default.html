<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ page.title | default: site.title }}</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="author" content="{{ site.author }}" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="{{ '/images/F-favicon.ico' | relative_url }}" />
  <link rel="icon" type="image/png" href="{{ '/images/F-favicon.png' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,700;1,300&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/css/styles.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/css/blog.css' | relative_url }}" />
</head>
<body class="site">
  <nav class="nav">
    <a href="{{ '/' | relative_url }}" class="nav__logo">
      <span class="nav__logo-name">Fitore</span>
      <span class="nav__logo-sep" aria-hidden="true"> &middot; </span>
      <span class="nav__logo-initials">FJP</span>
    </a>
    <button class="nav__hamburger" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__links">
      <li><a href="{{ '/blog/' | relative_url }}" class="nav__link">Writing</a></li>
      <li><a href="{{ '/#about' | relative_url }}" class="nav__link">About</a></li>
      <li><a href="{{ '/FitoreJahaPrice_Resume2026.pdf' | relative_url }}" class="nav__link" rel="nofollow">Resume</a></li>
      <li><button class="nav__toggle" aria-label="Toggle dark mode">&#9728;</button></li>
    </ul>
  </nav>

  {{ content }}

  <footer class="footer">
    <a href="{{ '/' | relative_url }}" class="footer__logo">Fitore</a>
    <span class="footer__copy">&copy; {{ site.time | date: '%Y' }} {{ site.author }}</span>
    <ul class="footer__links">
      <li><a href="https://www.linkedin.com/in/fitorejaha" class="footer__link" target="_blank" rel="nofollow">LinkedIn</a></li>
      <li><a href="https://twitter.com/tirofe" class="footer__link" target="_blank" rel="nofollow">X</a></li>
      <li><a href="{{ '/FitoreJahaPrice_Resume2026.pdf' | relative_url }}" class="footer__link" target="_blank" rel="nofollow">Resume</a></li>
    </ul>
  </footer>

  <script>
    (function () {
      var hamburger = document.querySelector('.nav__hamburger');
      var links = document.querySelector('.nav__links');
      if (hamburger && links) {
        hamburger.addEventListener('click', function () {
          var open = links.classList.toggle('is-open');
          hamburger.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }
      var toggle = document.querySelector('.nav__toggle');
      if (toggle) {
        toggle.addEventListener('click', function () {
          document.body.classList.toggle('dark');
        });
      }
    })();
  </script>
</body>
</html>
